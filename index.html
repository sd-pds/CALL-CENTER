<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Колл-центр</title>
  <link id="favicon" rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg"></div>

  <section class="loginGate" id="loginGate">
    <div class="loginCard">
      <div class="loginEyebrow">СЫТНАЯ ДОСТАВКА</div>
      <h1 class="loginTitle">Колл-центр</h1>
      <!--<p class="loginText">Вход в ленту заказов. После входа откроется список заказов со всех ресторанов.</p>-->
      <div class="loginForm">
        <input id="adminToken" type="password" placeholder="Введите пароль" />
        <button class="primaryBtn" id="saveAuthBtn">Войти</button>
      </div>
      <div id="connectState" class="connectState">Доступ заблокирован</div>
    </div>
  </section>

  <div class="appRoot" id="appRoot" hidden>
    <header class="topBar panel">
      <div class="topBar__main">
        <div>
          <div class="eyebrow">СЫТНАЯ ДОСТАВКА</div>
          <div class="topBar__titleRow">
            <h1>Колл-центр</h1>
            <!--<span class="topBar__live">Автообновление</span>-->
          </div>
        </div>
        <div class="topBar__search">
          <input id="searchInput" placeholder="Поиск по номеру, клиенту, телефону, адресу" />
        </div>
      </div>

      <div class="topBar__filters">
        <select id="siteFilter">
          <option value="">Все сайты</option>
          <option value="prozharim">ПРОЖАРИМ</option>
          <option value="sushidza">СУШИДЗА</option>
        </select>

        <select id="dateMode">
          <option value="all">За всё время</option>
          <option value="date">За дату</option>
        </select>

        <input id="dateInput" type="date" disabled />

        <button class="ghostBtn" id="applyFiltersBtn">Применить</button>
        <button class="primaryBtn" id="refreshBtn">Обновить</button>
      </div>
    </header>

    <section class="statsRow">
      <div class="statCard panel">
        <div class="statLabel">Новые</div>
        <div class="statValue" id="statNew">0</div>
      </div>
      <div class="statCard panel">
        <div class="statLabel">Всего</div>
        <div class="statValue" id="statTotal">0</div>
      </div>
      <div class="statCard panel">
        <div class="statLabel">Выручка</div>
        <div class="statValue" id="statRevenue">0 ₽</div>
      </div>
    </section>

    <section class="ordersPanel panel">
      <div class="ordersPanel__head">
        <div>
          <h2>Лента заказов</h2>
          <!--<p>Акцент на быстрый просмотр, фильтрацию и открытие деталей заказа.</p>-->
        </div>
        <div class="chips" id="statusChips">
          <button class="chip isOn" data-status="">Все</button>
          <button class="chip" data-status="new">Новый</button>
          <button class="chip" data-status="confirmed">Подтверждён</button>
          <button class="chip" data-status="cooking">Готовится</button>
          <button class="chip" data-status="delivery">У курьера</button>
          <button class="chip" data-status="done">Завершён</button>
          <button class="chip" data-status="cancelled">Отменён</button>
        </div>
      </div>

      <div class="ordersScroll">
        <table class="ordersTable">
          <thead>
            <tr>
              <th>Статус / №</th>
              <th>Время</th>
              <th>Клиент</th>
              <th>Получение</th>
              <th>Адрес</th>
              <th>Точка</th>
              <th>Сумма</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <div id="orderModal" class="orderModal" aria-hidden="true">
    <div class="orderModal__backdrop" id="orderModalBackdrop"></div>
    <div class="orderModal__dialog panel">
      <button class="orderModal__close" id="orderModalClose" aria-label="Закрыть">×</button>
      <div class="orderModal__body" id="orderDetails">Выбери заказ из таблицы.</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
